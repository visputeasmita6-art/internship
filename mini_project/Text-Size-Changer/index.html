<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Size Changer</title>

    <style>
        .container {
            width: 400px;
            margin: 50px auto;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 250px;
            padding: 10px;
            font-size: 16px;
        }

        #text {
            font-size: 16px;
            margin: 20px 0;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 0 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Text Size Changer</h1>

        <input type="text" id="inputText" placeholder="Type something here">

        <p id="text">Your text will appear here</p>

        <button id="plus">+</button>
        <button id="minus">-</button>
    </div>

    <script>
        // Select elements
        let input = document.getElementById("inputText");
        let text = document.getElementById("text");
        let plusBtn = document.getElementById("plus");
        let minusBtn = document.getElementById("minus");

        // Starting font size
        let size = 16;

        // Show text while typing
        input.addEventListener("keyup", function () {
            if (input.value === "") {
                text.innerText = "Your text will appear here";
            } else {
                text.innerText = input.value;
            }
        });

        // Increase font size
        plusBtn.addEventListener("click", function () {
            size = size + 2;
            text.style.fontSize = size + "px";
        });

        // Decrease font size
        minusBtn.addEventListener("click", function () {
            if (size > 10) {
                size = size - 2;
                text.style.fontSize = size + "px";
            }
        });
    </script>

</body>
</html>
