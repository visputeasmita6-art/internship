<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analog Clock</title>

<style>
    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        font-family:Arial, sans-serif;
    }

    .clock{
        width:300px;
        height:300px;
        border:8px solid black;
        border-radius:50%;
        position:relative;
    }

    .hand{
        position:absolute;
        bottom:50%;
        left:50%;
        transform-origin:bottom;
        transform:translateX(-50%);
    }

    .hour{
        width:6px;
        height:80px;
        background:black;
    }

    .minute{
        width:4px;
        height:110px;
        background:black;
    }

    .second{
        width:2px;
        height:130px;
        background:red;
    }

    .center{
        width:12px;
        height:12px;
        background:black;
        border-radius:50%;
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
    }

    .num{
        position:absolute;
        font-size:24px;
        font-weight:bold;
    }

    .twelve{top:10px; left:50%; transform:translateX(-50%);}
    .three{right:10px; top:50%; transform:translateY(-50%);}
    .six{bottom:10px; left:50%; transform:translateX(-50%);}
    .nine{left:10px; top:50%; transform:translateY(-50%);}
</style>
</head>
<body>

<div class="clock">

    <div class="num twelve">12</div>
    <div class="num three">3</div>
    <div class="num six">6</div>
    <div class="num nine">9</div>

    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>

    <div class="center"></div>
</div>

<script>
function updateClock() {

    let now = new Date();

    let hours = now.getHours();
    let minutes = now.getMinutes();
    let seconds = now.getSeconds();

    let hourDeg = (hours % 12) * 30 + minutes * 0.5;
    let minuteDeg = minutes * 6;
    let secondDeg = seconds * 6;

    document.getElementById("hour").style.transform =
        `translateX(-50%) rotate(${hourDeg}deg)`;

    document.getElementById("minute").style.transform =
        `translateX(-50%) rotate(${minuteDeg}deg)`;

    document.getElementById("second").style.transform =
        `translateX(-50%) rotate(${secondDeg}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
