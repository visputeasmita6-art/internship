<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <style>
    body{
        background-color:rgb(242, 236, 236) ;

    }
    .container1{
        height: 100px;
        width: 100px;
        background-color: rgb(244, 239, 239);

    }
   </style>
</head>
<body>

       <div class="container1">
           <img src="bg-image.jpg" alt="Fruits" style="width: 100%; height: 100%; object-fit: cover;">
       </div>
        <div class="container">
            <h2>Filter Fruits By Type</h2>
            <select id="fruitType">
                <option value="all">All</option>
                <option value="citrus">Citrus</option>
                <option value="berry">Berry</option>
                <option value="stone">Stone Fruit</option>
            </select>
            <button id="filterBtn">Filter</button>
            <ul id="fruitList">
                <!-- Fruits will be displayed here -->
            </ul>
        </div>
        <script>

            
       const fruits = 
       [
    { name: "Orange", type: "citrus" },
    { name: "Blueberry", type: "berry" },
    { name: "Peach", type: "stone" },
    { name: "Lemon", type: "citrus" },
    { name: "Strawberry", type: "berry" },
    { name: "Cherry", type: "stone" },
      ];

            const fruitSelected = document.getElementById("fruitType");
            const filterButton = document.getElementById("filterBtn");
            const fruitList = document.getElementById("fruitList");

            function renderFruits(items) {
                fruitList.innerHTML = "";
                items.forEach((fruit) => {
                    const newli = document.createElement("li");
                    newli.textContent = fruit.name;
                    fruitList.append(newli);
                });
            }

            function filterFruits() {
                const selectedType = fruitSelected.value;
                const filteredFruits = fruits.filter((fruit) => {
                    return selectedType === "all" || fruit.type === selectedType;
                });
                renderFruits(filteredFruits);
            }

            filterButton.addEventListener("click", (e) => {
                e.preventDefault();
                filterFruits();
            });

            renderFruits(fruits);
        </script>
</body>

</html>
